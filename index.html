<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, where, deleteDoc,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdjAdizNKwzAgEE23ihRMq8ViKDbecknI",
    authDomain: "gerenciador-links-5af48.firebaseapp.com",
    projectId: "gerenciador-links-5af48",
    storageBucket: "gerenciador-links-5af48.firebasestorage.app",
    messagingSenderId: "1036983844836",
    appId: "1:1036983844836:web:362f0a24b428287a3451f1",
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  const auth = getAuth(firebaseApp);

  window.firebaseAuth = {
    async loginGoogle() {
      const provider = new GoogleAuthProvider();
      const { user } = await signInWithPopup(auth, provider);
      await setDoc(doc(db, "usuarios", user.uid), {
        uid: user.uid, nome: user.displayName || "", email: user.email || "",
        foto: user.photoURL || "", ultimoLogin: new Date().toISOString(),
      }, { merge: true });
      return user;
    },
    async logout() { await signOut(auth); },
    onChange(cb) { onAuthStateChanged(auth, cb); },
  };

  window.firebaseAfiliado = {
    async salvar(uid, dados) {
      await setDoc(doc(db, "config_afiliado", uid), { ...dados, atualizadoEm: new Date().toISOString() }, { merge: true });
    },
    async carregar(uid) {
      const snap = await getDoc(doc(db, "config_afiliado", uid));
      return snap.exists() ? snap.data() : null;
    },
  };

  // Carrega ofertas e limpa as que passaram de 24h
  window.firebaseOfertas = {
    async carregarAtivas() {
      try {
        const snap = await getDocs(collection(db, "ofertas"));
        const agora = Date.now();
        const validas = [];
        const expiradas = [];
        snap.docs.forEach(d => {
          const dados = d.data();
          const ts = dados.encontradoEm ? new Date(dados.encontradoEm).getTime() : 0;
          if (agora - ts > 24 * 60 * 60 * 1000) {
            expiradas.push(d.ref);
          } else {
            validas.push(dados);
          }
        });
        // Deleta expiradas em background
        expiradas.forEach(ref => deleteDoc(ref).catch(() => {}));
        return validas;
      } catch (e) {
        console.error("Erro ao carregar ofertas:", e);
        return [];
      }
    },
  };

  window.firebaseHistory = {
    async save(offer) {
      try { await setDoc(doc(db, "historico", offer.id), offer); return true; }
      catch (e) { console.error("Erro ao salvar:", e); return false; }
    },
    async loadAll() {
      try {
        const q = query(collection(db, "historico"), orderBy("ts", "desc"), limit(30));
        const snap = await getDocs(q);
        return snap.docs.map(d => d.data());
      } catch (e) { return []; }
    },
  };

  window.dispatchEvent(new Event("firebase-ready"));
</script>

  if (!antigo || antigo <= 0) return { label: "Sem histórico", dot: "⚪", pct: 0, cls: "tier-gray" };
  const pct = ((antigo - atual) / antigo) * 100;

// Gera o texto completo para WhatsApp — copy + link numa mensagem só
function gerarMensagemWhatsApp(offer) {
  const link = linkParaMim(offer);
  const atual = offer.precoAtual || 0;
  const antigo = offer.precoAntigo || 0;
  const pct = antigo > 0 && atual > 0 ? Math.round(((antigo - atual) / antigo) * 100) : 0;

  const linhas = [`🔥 *${offer.produto}*${pct > 0 ? ` com ${pct}% OFF` : ""}`];
  if (antigo > 0 && atual > 0) linhas.push(`De ${fmt(antigo)} por *${fmt(atual)}*`);
  else if (atual > 0) linhas.push(`Por apenas *${fmt(atual)}*`);
  if (offer.cupom) linhas.push(`⚠️ Use o cupom *${offer.cupom}* antes que acabe`);
  linhas.push(`🚨 Estoque limitado — corre que pode sumir!`);
  if (link) linhas.push(`\n🛒 ${link}`);

  return linhas.join("\n");
}

function fallbackCopy(produto, atual, antigo, cupom) {
  const pct = antigo > 0 ? Math.round(((antigo - atual) / antigo) * 100) : 0;
  const linhas = [
    `🔥 *${produto}*${pct > 0 ? ` com ${pct}% OFF` : ""}`,
    antigo > 0 ? `De ${fmt(antigo)} por ${fmt(atual)}` : `Por apenas ${fmt(atual)}`,
    cupom ? `⚠️ Use o cupom *${cupom}* antes que acabe` : `🚨 Estoque limitado`,
    `Corre que essa pode sumir do site!`,
  ];
  return { titulo: `${produto}${pct > 0 ? ` — ${pct}% OFF` : ""}`, texto: linhas.join("\n"), hashtags: ["#promocao", "#achadinhos", "#oferta"] };
}

// Detecta loja e comissão pelo domínio
function detectarLoja(url) {
  if (!url) return { loja: "Shopee", comissao: "10" };
  if (url.includes("shopee")) return { loja: "Shopee", comissao: "10" };
  if (url.includes("mercadolivre") || url.includes("mercadolibre") || url.includes("ml.com")) return { loja: "Mercado Livre", comissao: "8" };
  if (url.includes("amazon")) return { loja: "Amazon", comissao: "12" };
  if (url.includes("aliexpress")) return { loja: "AliExpress", comissao: "8" };
  return { loja: "Shopee", comissao: "10" };
}

// Limpa preço de string para número
function parsearPreco(texto) {
  if (!texto) return 0;
  const m = texto.replace(/R\$\s*/gi,"").trim().match(/(\d{1,3}(?:\.\d{3})*(?:,\d{2})?|\d+(?:,\d{2})?)/);
  if (!m) return 0;
  return parseFloat(m[1].replace(/\.(?=\d{3})/g,"").replace(",",".")) || 0;
}

// Tenta carregar dados do produto a partir do link colado
async function parsearLink(url) {
  if (!url || !url.startsWith("http")) return null;
  const { loja, comissao } = detectarLoja(url);
  
  try {
    // Proxy CORS para ler o HTML da página do produto
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error("proxy falhou");
    const json = await res.json();
    const html = json.contents || "";
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // Helpers
    const og = prop => doc.querySelector(`meta[property="og:${prop}"]`)?.content
                    || doc.querySelector(`meta[name="og:${prop}"]`)?.content || "";

    // Nome do produto
    let nome = og("title") || doc.querySelector("title")?.innerText || "";
    // Remove sufixo da loja do título (ex: "| Shopee Brasil", "- Amazon.com.br")
    nome = nome.replace(/[|\-].*?(Shopee|Amazon|Mercado|AliExpress).*/i, "").trim().slice(0, 150);

    // Imagem
    const imagemUrl = og("image") || doc.querySelector('img[class*="product"], img[class*="item"]')?.src || "";

    // Preço — tenta JSON-LD primeiro
    let precoAtual = 0, precoAntigo = 0;
    const scripts = Array.from(doc.querySelectorAll('script[type="application/ld+json"]'));
    for (const s of scripts) {
      try {
        const data = JSON.parse(s.textContent);
        const offers = data.offers || data["@graph"]?.[0]?.offers;
        if (offers) {
          precoAtual  = parseFloat(offers.price || offers.lowPrice || 0) || 0;
          precoAntigo = parseFloat(offers.highPrice || 0) || 0;
        }
      } catch {}
      if (precoAtual > 0) break;
    }

    // Preço — tenta meta tags específicas da Shopee
    if (precoAtual === 0 && loja === "Shopee") {
      const priceMeta = doc.querySelector('meta[property="product:price:amount"]')?.content
                     || doc.querySelector('meta[name="price"]')?.content || "";
      precoAtual = parsearPreco(priceMeta);
    }

    // Preço — tenta meta tags da Amazon
    if (precoAtual === 0 && loja === "Amazon") {
      const priceEl = doc.querySelector('#priceblock_ourprice, .a-price .a-offscreen, #price_inside_buybox');
      precoAtual = parsearPreco(priceEl?.innerText || "");
    }

    // Gera link de afiliado automaticamente com os dados salvos no perfil
    const linkAfiliado = gerarLinkAfiliadoLocal(loja, url, state.afiliado);

    return {
      produto:     nome,
      imagemUrl:   imagemUrl,
      loja,
      precoAtual:  precoAtual > 0 ? String(precoAtual) : "",
      precoAntigo: precoAntigo > 0 ? String(precoAntigo) : "",
      comissaoPct: comissao,
      linkAfiliado,
    };
  } catch (e) {
    // Mesmo que falhe em pegar detalhes, retorna pelo menos loja e comissão
    const linkAfiliado = gerarLinkAfiliadoLocal(loja, url, state.afiliado);
    return { produto: "", imagemUrl: "", loja, precoAtual: "", precoAntigo: "", comissaoPct: comissao, linkAfiliado };
  }
}

// Fonte única do link de afiliado no front-end (espelha lib/afiliado.js).
// Mercado Livre usa "affiliate=ID", igual Shopee/Amazon — mesmo campo
// "ID parceiro" que a tela de Perfil de Afiliado já pede.
function gerarLinkAfiliadoLocal(loja, link, afiliado) {
  if (!link) return "";
  const sep = link.includes("?") ? "&" : "?";
  if (loja === "Shopee" && afiliado?.shopee?.id) return `${link}${sep}affiliate=${afiliado.shopee.id}`;
  if (loja === "Mercado Livre" && afiliado?.mercadolivre?.idParceiro) return `${link}${sep}affiliate=${afiliado.mercadolivre.idParceiro}`;
  if (loja === "Amazon" && afiliado?.amazon?.tag) return `${link}${sep}tag=${afiliado.amazon.tag}`;
  return link;
}

// Sempre recalcula o link de afiliado a partir do link cru + perfil de QUEM
// ESTÁ LOGADO AGORA. Isso garante que ofertas achadas pelo caçador (que são
// compartilhadas entre todos os usuários) saiam com o link de cada pessoa,
// e não com o link de quem cadastrou o app.
function linkParaMim(offer) {
  if (offer.link) return gerarLinkAfiliadoLocal(offer.loja, offer.link, state.afiliado) || offer.link;
  return offer.linkAfiliado || "";
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "", curY = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + " ";
    if (ctx.measureText(test).width > maxWidth && i > 0) {
      ctx.fillText(line, x, curY); line = words[i] + " "; curY += lineHeight;
    } else line = test;
  }
  ctx.fillText(line, x, curY);
}
function drawRest(ctx, W, H, o) {
  const antigo = o.precoAntigo || 0;
  const atual = o.precoAtual || 0;
  const pct = antigo > 0 ? Math.round(((antigo - atual) / antigo) * 100) : 0;
  if (pct > 0) {
    ctx.fillStyle = "#22C55E"; ctx.beginPath(); ctx.roundRect(60, 24, 130, 40, 10); ctx.fill();
    ctx.fillStyle = "#0A0E14"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`-${pct}% OFF`, 75, 51);
  }
  ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "600 18px sans-serif"; ctx.textAlign = "right";
  ctx.fillText(o.loja, W - 60, 50);
  ctx.fillStyle = "#fff"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "left";
  wrapText(ctx, o.produto || "Produto", 60, H - 220, W - 120, 32);
  if (antigo > 0) {
    ctx.font = "20px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fillText(fmt(antigo), 60, H - 150);
    const sw = ctx.measureText(fmt(antigo)).width;
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.beginPath();
    ctx.moveTo(60, H - 156); ctx.lineTo(60 + sw, H - 156); ctx.stroke();
  }
  ctx.font = "bold 42px sans-serif"; ctx.fillStyle = "#34D399";
  ctx.fillText(fmt(atual), 60, H - 100);
  if (o.cupom) {
    ctx.fillStyle = "#7C3AED"; ctx.beginPath(); ctx.roundRect(60, H - 75, 220, 44, 10); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif";
    ctx.fillText(`CUPOM: ${o.cupom}`, 75, H - 47);
  }
}
function drawBanner(canvas, o) {
  return new Promise(resolve => {
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const paint = () => {
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, "#0A0E14"); grad.addColorStop(1, o.cor || "#1e3a8a");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fillRect(60, 70, W - 120, H - 320);
      ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("📦", W / 2, 70 + (H - 320) / 2 + 10);
      drawRest(ctx, W, H, o); resolve(canvas.toDataURL("image/png"));
    };
    if (o.imagemUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, "#0A0E14"); grad.addColorStop(1, o.cor || "#1e3a8a");
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, 60, 70, W - 120, H - 320);
        drawRest(ctx, W, H, o); resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = paint; img.src = o.imagemUrl;
    } else paint();
  });
}

// Quando o usuário cola um link — busca tudo automaticamente
async function onLinkChange(url) {
  state.form.link = url;
  if (!url || !url.startsWith("http")) { renderMain(); return; }
  
  // Detecta loja imediatamente (sem precisar esperar o fetch)
  const { loja, comissao } = detectarLoja(url);
  state.form.loja = loja;
  state.form.comissaoPct = comissao;
  state.parsing = true;
  renderMain();

  const dados = await parsearLink(url);
  state.parsing = false;

  if (dados) {
    if (dados.produto)      state.form.produto      = dados.produto;
    if (dados.imagemUrl)    state.form.imagemUrl    = dados.imagemUrl;
    if (dados.loja)         state.form.loja         = dados.loja;
    if (dados.precoAtual)   state.form.precoAtual   = dados.precoAtual;
    if (dados.precoAntigo)  state.form.precoAntigo  = dados.precoAntigo;
    if (dados.comissaoPct)  state.form.comissaoPct  = dados.comissaoPct;
    // Salva link de afiliado gerado automaticamente
    if (dados.linkAfiliado) state.form.linkAfiliado = dados.linkAfiliado;
  }
  renderMain();
}

async function downloadOfferArt(offer) {

  const url = await drawBanner(canvas, offer);
  const a = document.createElement("a");
  a.href = url; a.download = `oferta-${(offer.produto || "produto").toLowerCase().replace(/\s+/g, "-").slice(0, 30)}.png`;

function resetForm() {
  state.form = { link: "", produto: "", loja: "Shopee", precoAntigo: "", precoAtual: "", comissaoPct: "", cupom: "", imagemUrl: "" };
  state.pipeline = null; state.generated = null; state.error = null; state.parsing = false;
  renderMain();
}
async function runPipeline() {
  const f = state.form;
  state.error = null;
  if (!f.produto) { state.error = "Preencha o nome do produto."; renderMain(); return; }
  if (!f.precoAtual) { state.error = "Preencha o preço atual."; renderMain(); return; }
  if (!f.comissaoPct) { state.error = "Preencha a % de comissão."; renderMain(); return; }
  const antigo = parseFloat(String(f.precoAntigo).replace(",", ".")) || 0;
  const atual = parseFloat(String(f.precoAtual).replace(",", "."));
  const comissao = parseFloat(String(f.comissaoPct).replace(",", "."));
  if (isNaN(atual) || isNaN(comissao)) { state.error = "Preço atual e comissão precisam ser números."; renderMain(); return; }
  state.generated = null; state.busy = true;
  state.pipeline = PIPELINE_STEPS.map(s => ({ ...s, status: "pending" }));
  renderMain();

  // Monta oferta localmente (sem backend Railway)
  // Usa linkAfiliado já gerado no parsearLink, ou gera agora
  const linkAfiliado = f.linkAfiliado || gerarLinkAfiliadoLocal(f.loja, f.link, state.afiliado);

  const offer = {
    id: "gen-" + Date.now(),
    produto: f.produto, loja: f.loja,
    precoAntigo: antigo, precoAtual: atual, comissaoPct: comissao,
    cupom: f.cupom || null, link: f.link || null, imagemUrl: f.imagemUrl || null,
    linkAfiliado,
    linkEncurtado: linkAfiliado, // será encurtado pelo bot no próximo ciclo
    copy: fallbackCopy(f.produto, atual, antigo, f.cupom),
    ts: Date.now(), cor: "#1e3a8a",
    encontradoEm: new Date().toISOString(),
  };

  for (let i = 0; i < PIPELINE_STEPS.length; i++) {
    state.pipeline[i].status = "active"; renderMain();
    await new Promise(r => setTimeout(r, 400));
    state.pipeline[i].status = "done"; renderMain();
  }

  state.generated = offer;
  state.history = [offer, ...state.history].slice(0, 30);
  saveOfferToHistory(offer);
  state.busy = false; renderMain();
}

  const f = state.form;
  const pipelineHTML = state.pipeline ? state.pipeline.map(s => {
    const icon = s.status === "done" ? `<span style="color:#34d399;">✓</span>`
      : s.status === "active" ? `<span class="spin" style="color:#60a5fa;">⟳</span>`
      : `<span class="step-pending">○</span>`;
    const labelCls = s.status === "pending" ? "step-label-pending" : "step-label-active";
    return `<div class="pipeline-step"><span class="step-icon">${icon}</span><span class="${labelCls}">${s.bot.name}</span><span class="step-sub">— ${s.label}</span></div>`;
  }).join("") : `<div class="placeholder-text">Cole o link do produto e clique em "Acionar bots".</div>`;

  const genHTML = state.generated ? `<div class="gen-wrap">${offerCardHTML(state.generated)}</div>` : "";

  return `
  <div class="two-col">
    <div class="card">
      <div class="panel-title">🔗 Inserir oferta manualmente</div>
      <div class="form-grid">
        <div class="field">
          <span>Link do produto — cole aqui e os campos preenchem sozinhos</span>
          <input id="f_link" value="${f.link}" oninput="onLinkChange(this.value)" placeholder="https://shopee.com.br/produto...">
          ${state.parsing ? `<div class="parsing-badge">🔍 Buscando dados do produto...</div>` : ""}
        </div>
        <div class="field"><span>Nome do produto *</span><input id="f_produto" value="${f.produto}" oninput="setField('produto', this.value)" placeholder="Fone Bluetooth TWS Pro"></div>
        <div class="row2">
          <div class="field"><span>Loja</span>
            <select id="f_loja" onchange="setField('loja', this.value)">
              ${LOJAS.map(l => `<option ${f.loja === l ? "selected" : ""}>${l}</option>`).join("")}
            </select>
          </div>
          <div class="field"><span>Cupom (opcional)</span><input id="f_cupom" value="${f.cupom}" oninput="setField('cupom', this.value)" placeholder="PROMO10"></div>
        </div>
        <div class="row3">
          <div class="field"><span>Preço antigo (opcional)</span><input id="f_pa" value="${f.precoAntigo}" oninput="setField('precoAntigo', this.value)" placeholder="89,90"></div>
          <div class="field"><span>Preço atual *</span><input id="f_pn" value="${f.precoAtual}" oninput="setField('precoAtual', this.value)" placeholder="34,90"></div>
          <div class="field"><span>Comissão % *</span><input id="f_com" value="${f.comissaoPct}" oninput="setField('comissaoPct', this.value)" placeholder="12"></div>
        </div>
        <div class="field"><span>URL da imagem (preenchida automaticamente)</span><input id="f_img" value="${f.imagemUrl}" oninput="setField('imagemUrl', this.value)" placeholder="https://..."></div>
        ${f.linkAfiliado ? `<div class="field"><span style="color:#34d399;">✓ Link de afiliado gerado automaticamente</span><input value="${f.linkAfiliado}" readonly style="color:#34d399;opacity:.8;font-size:11px;"></div>` : ""}
        ${state.error ? `<div class="error-text">${state.error}</div>` : ""}
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn-primary" onclick="runPipeline()" ${state.busy ? "disabled" : ""}>✨ Acionar bots</button>
          <button class="btn-ghost" onclick="resetForm()">Limpar</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="panel-title">🤖 Pipeline dos bots</div>
      <div style="padding-top:14px;">${pipelineHTML}</div>
      ${genHTML}
    </div>
  </div>`;
}

function renderPerfilTab() {
  if (!state.user) return `<div class="card"><div class="placeholder-text">Entre com sua conta Google para salvar seu perfil de afiliado.</div></div>`;
  const a = state.afiliado;
  return `
  <div class="card">
    <div class="panel-title">🛍️ Shopee</div>
    <div class="form-grid">
      <div class="row2">
        <div class="field"><span>Nome do afiliado</span><input value="${a.shopee?.nome || ""}" oninput="setAfiliado('shopee','nome',this.value)" placeholder="Seu nome"></div>
        <div class="field"><span>ID afiliado</span><input value="${a.shopee?.id || ""}" oninput="setAfiliado('shopee','id',this.value)" placeholder="123456"></div>
      </div>
      <div class="field"><span>Link base (opcional)</span><input value="${a.shopee?.linkBase || ""}" oninput="setAfiliado('shopee','linkBase',this.value)" placeholder="https://shope.ee/..."></div>
    </div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="panel-title">🛒 Mercado Livre</div>
    <div class="form-grid">
      <div class="row2">
        <div class="field"><span>ID parceiro</span><input value="${a.mercadolivre?.idParceiro || ""}" oninput="setAfiliado('mercadolivre','idParceiro',this.value)" placeholder="seu_id_parceiro"></div>
        <div class="field"><span>Link parceiro (opcional)</span><input value="${a.mercadolivre?.linkParceiro || ""}" oninput="setAfiliado('mercadolivre','linkParceiro',this.value)" placeholder="https://..."></div>
      </div>
    </div>
  </div>
  <div class="card" style="margin-top:16px;">
    <div class="panel-title">📦 Amazon</div>
    <div class="form-grid">
      <div class="field"><span>Tag de afiliado</span><input value="${a.amazon?.tag || ""}" oninput="setAfiliado('amazon','tag',this.value)" placeholder="seunome-20"></div>
      <div style="display:flex;align-items:center;gap:4px;">
        <button class="btn-primary" style="flex:0 0 auto;padding:11px 22px;" onclick="salvarPerfil()" ${state.perfilSalvando ? "disabled" : ""}>${state.perfilSalvando ? "Salvando..." : "💾 Salvar perfil"}</button>
        ${state.perfilSalvo ? `<span class="save-ok">✓ Salvo</span>` : ""}
      </div>
      <div class="uid-note">Seu UID (cole no GitHub Secret <b>OWNER_UID</b>): ${state.user.uid}</div>
    </div>
  </div>`;
}

function renderConfigTab() {
  if (!state.user) return `<div class="card"><div class="placeholder-text">Entre com sua conta Google para configurar.</div></div>`;
  const favoritas = state.afiliado.categoriasFavoritas || [];
  return `
  <div class="card">
    <div class="panel-title">⚙️ Categorias favoritas</div>
    <div class="form-grid">
      <div class="checkbox-row">
        ${CATEGORIAS.map(c => `<label><input type="checkbox" ${favoritas.includes(c) ? "checked" : ""} onchange="toggleCategoriaFavorita('${c}', this.checked)"> ${c}</label>`).join("")}
      </div>
      <div class="field" style="max-width:260px;">
        <span>Intervalo de busca do bot</span>
        <select onchange="setAfiliadoCampo('intervaloBusca', this.value)">
          <option value="15min" ${state.afiliado.intervaloBusca === "15min" ? "selected" : ""}>15 minutos</option>
          <option value="30min" ${state.afiliado.intervaloBusca === "30min" ? "selected" : ""}>30 minutos</option>
          <option value="1h" ${state.afiliado.intervaloBusca === "1h" ? "selected" : ""}>1 hora</option>
        </select>
      </div>
      <div>
        <button class="btn-primary" style="max-width:200px;" onclick="salvarPerfil()" ${state.perfilSalvando ? "disabled" : ""}>${state.perfilSalvando ? "Salvando..." : "💾 Salvar"}</button>
        ${state.perfilSalvo ? `<span class="save-ok">✓ Salvo</span>` : ""}
      </div>
    </div>
  </div>`;
}

function renderHistoryTab() {
  return `
  <div class="card hist-section">
    <div class="panel-title" style="padding:0 0 14px;">📜 Histórico de ofertas geradas</div>
    ${state.history.length === 0 ? `<div class="placeholder-text">Nenhuma oferta gerada ainda.</div>` :
      `<div class="offers-grid">${state.history.map(offerCardHTML).join("")}</div>`}
  </div>`;
}

function renderMain() {
  const active = document.activeElement;
  const activeId = active?.id;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;

  const html =
    state.tab === "dashboard" ? renderDashboard() :
    state.tab === "link" ? renderLinkTab() :
    state.tab === "historico" ? renderHistoryTab() :
    state.tab === "perfil" ? renderPerfilTab() :
    state.tab === "config" ? renderConfigTab() :
    renderDashboard();
  document.getElementById("main").innerHTML = html;

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) { el.focus(); if (selStart !== null && el.setSelectionRange) try { el.setSelectionRange(selStart, selStart); } catch(e) {} }
  }
}

function renderBotRoster() {
  document.getElementById("botRoster").innerHTML = BOTS.map(b => `
    <div class="bot-row">
      <div class="bot-icon" style="background:${b.color}1A;color:${b.color};">${b.icon}<span class="bot-dot"></span></div>
      <div><div class="bot-name">${b.name}</div><div class="bot-role">${b.role}</div></div>
    </div>`).join("");
}

function renderActivity() {
  document.getElementById("activityFeed").innerHTML = state.activity.map(a => {
    const secs = Math.max(0, Math.floor((Date.now() - a.ts) / 1000));
    return `<div class="activity-item">
      <span style="color:${a.color};">›</span>
      <div><div class="activity-text">${a.text}</div><div class="activity-time">${secs <= 1 ? "agora mesmo" : `há ${secs}s`}</div></div>
    </div>`;
  }).join("");
}

function render() { renderNav(); renderMain(); renderBotRoster(); renderActivity(); renderAuthBox(); }

function addActivity() {
  const bot = BOTS[Math.floor(Math.random() * BOTS.length)];
  const tpl = ACTIVITY_TEMPLATES[Math.floor(Math.random() * ACTIVITY_TEMPLATES.length)];
  state.activity = [{ id: Date.now() + Math.random(), text: tpl(bot.name), color: bot.color, ts: Date.now() }, ...state.activity].slice(0, 6);
  renderActivity();
}
setInterval(() => { renderActivity(); }, 1000);
setInterval(addActivity, 4500);

function init() {
  addActivity(); render();
  whenFirebaseReady(async () => {
    await loadHistory();
    await loadOfertasBot();
    renderMain();
    window.firebaseAuth.onChange(async (user) => {
      state.user = user;
      if (user) await loadAfiliado(user.uid);
      render();
    });
  });
  setInterval(async () => {
    if (window.firebaseOfertas) { await loadOfertasBot(); if (state.tab === "dashboard") renderMain(); }
  }, 5 * 60 * 1000);
}
init();
</script>
</body>
</html>
