<script type="module">
  // ---------- Firebase ----------
  // Config do seu projeto "gerenciador-links". Isso é seguro de ficar público:
  // a proteção de verdade fica nas Regras do Firestore (Firebase Console > Firestore > Regras).
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdjAdizNKwzAgEE23ihRMq8ViKDbecknI",
    authDomain: "gerenciador-links-5af48.firebaseapp.com",
    projectId: "gerenciador-links-5af48",
    storageBucket: "gerenciador-links-5af48.firebasestorage.app",
    messagingSenderId: "1036983844836",
    appId: "1:1036983844836:web:362f0a24b428287a3451f1",
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  const auth = getAuth(firebaseApp);

  // ---- Login Google + registro em "usuarios" ----
  window.firebaseAuth = {
    async loginGoogle() {
      const provider = new GoogleAuthProvider();
      const { user } = await signInWithPopup(auth, provider);
      await setDoc(doc(db, "usuarios", user.uid), {
        uid: user.uid,
        nome: user.displayName || "",
        email: user.email || "",
        foto: user.photoURL || "",
        ultimoLogin: new Date().toISOString(),
      }, { merge: true });
      return user;
    },
    async logout() {
      await signOut(auth);
    },
    onChange(cb) {
      onAuthStateChanged(auth, cb);
    },
  };

  // ---- Perfil de afiliado (Shopee / Mercado Livre / Amazon) ----
  window.firebaseAfiliado = {
    async salvar(uid, dados) {
      await setDoc(doc(db, "config_afiliado", uid), { ...dados, atualizadoEm: new Date().toISOString() }, { merge: true });
    },
    async carregar(uid) {
      const snap = await getDoc(doc(db, "config_afiliado", uid));
      return snap.exists() ? snap.data() : null;
    },
  };

  // ---- Ofertas encontradas pelo Bot Caçador (gravadas pelo GitHub Actions) ----
  window.firebaseOfertas = {
    async carregarAtivas() {
      try {
        const snap = await getDocs(collection(db, "ofertas"));
        return snap.docs.map((d) => d.data());
      } catch (e) {
        console.error("Erro ao carregar ofertas do Firestore:", e);
        return [];
      }
    },
  };

  // ---- Histórico de ofertas geradas manualmente (aba "Inserir Link") ----
  window.firebaseHistory = {
    async save(offer) {
      try {
        await setDoc(doc(db, "historico", offer.id), offer);
        return true;
      } catch (e) {
        console.error("Erro ao salvar no Firestore:", e);
        return false;
      }
    },
    async loadAll() {
      try {
        const q = query(collection(db, "historico"), orderBy("ts", "desc"), limit(30));
        const snap = await getDocs(q);
        return snap.docs.map((d) => d.data());
      } catch (e) {
        console.error("Erro ao carregar do Firestore:", e);
        return [];
      }
    },
  };

  // avisa o script principal que o Firebase já está pronto para uso
  window.dispatchEvent(new Event("firebase-ready"));
</script>

// ---------- Helpers ----------
const fmt = n => `R$ ${n.toFixed(2).replace(".", ",")}`;
function discountTier(antigo, atual) {
  const pct = ((antigo - atual) / antigo) * 100;
  if (pct >= 50) return { label: "Excelente", dot: "🟢", pct, cls: "tier-green" };
  if (pct >= 25) return { label: "Boa", dot: "🟡", pct, cls: "tier-amber" };
  return { label: "Fraca", dot: "🔴", pct, cls: "tier-rose" };
}
function commissionTier(pct) {
  if (pct >= 15) return { label: "Alta", dot: "🟢", cls: "tier-green" };
  if (pct >= 7) return { label: "Média", dot: "🟡", cls: "tier-amber" };
  return { label: "Baixa", dot: "🔴", cls: "tier-rose" };
}
const earnings = (atual, pct) => atual * (pct / 100);
function tierStyle(cls) {

// ---------- Backend ----------
// Endereço do servidor backend no Railway.
const BACKEND_URL = "https://bot-shopee-production-6888.up.railway.app";

async function chamarBackendGerarOferta(payload) {
  const res = await fetch(`${BACKEND_URL}/api/gerar-oferta`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.erro || "Erro ao gerar oferta no backend");
  return data;
}

// Mesma lógica do lib/afiliado.js do backend — usada só quando o Railway está
// fora do ar e o painel precisa montar o link localmente como fallback.
function gerarLinkAfiliadoLocal(loja, link, afiliado) {
  if (!link) return "https://shope.ee/aff-marcos";
  const sep = link.includes("?") ? "&" : "?";
  if (loja === "Shopee" && afiliado?.shopee?.id) return `${link}${sep}affiliate=${afiliado.shopee.id}`;
  if (loja === "Mercado Livre" && afiliado?.mercadolivre?.idParceiro) return `${link}${sep}matt_tool=${afiliado.mercadolivre.idParceiro}`;
  if (loja === "Amazon" && afiliado?.amazon?.tag) return `${link}${sep}tag=${afiliado.amazon.tag}`;
  return link;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "", curY = y;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + " ";
    if (ctx.measureText(test).width > maxWidth && i > 0) {
      ctx.fillText(line, x, curY); line = words[i] + " "; curY += lineHeight;
    } else line = test;
  }
  ctx.fillText(line, x, curY);
}
function drawRest(ctx, W, H, o) {
  const pct = Math.round(((o.precoAntigo - o.precoAtual) / o.precoAntigo) * 100);
  ctx.fillStyle = "#22C55E"; ctx.beginPath(); ctx.roundRect(60, 24, 130, 40, 10); ctx.fill();
  ctx.fillStyle = "#0A0E14"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`-${pct}% OFF`, 75, 51);
  ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "600 18px sans-serif"; ctx.textAlign = "right";
  ctx.fillText(o.loja, W - 60, 50);
  ctx.fillStyle = "#fff"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "left";
  wrapText(ctx, o.produto, 60, H - 220, W - 120, 32);
  ctx.font = "20px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText(fmt(o.precoAntigo), 60, H - 150);
  const sw = ctx.measureText(fmt(o.precoAntigo)).width;
  ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.beginPath();
  ctx.moveTo(60, H - 156); ctx.lineTo(60 + sw, H - 156); ctx.stroke();
  ctx.font = "bold 42px sans-serif"; ctx.fillStyle = "#34D399";
  ctx.fillText(fmt(o.precoAtual), 60, H - 100);
  if (o.cupom) {
    ctx.fillStyle = "#7C3AED"; ctx.beginPath(); ctx.roundRect(60, H - 75, 220, 44, 10); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "bold 18px sans-serif";
    ctx.fillText(`🎟 CUPOM: ${o.cupom}`, 75, H - 47);
  }
}
function drawBanner(canvas, o) {
  return new Promise(resolve => {
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const paint = () => {
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, "#0A0E14"); grad.addColorStop(1, o.cor || "#1e3a8a");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fillRect(60, 70, W - 120, H - 320);
      ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
      ctx.fillText("📦", W / 2, 70 + (H - 320) / 2 + 10);
      drawRest(ctx, W, H, o);
      resolve(canvas.toDataURL("image/png"));
    };
    if (o.imagemUrl) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, "#0A0E14"); grad.addColorStop(1, o.cor || "#1e3a8a");
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        ctx.drawImage(img, 60, 70, W - 120, H - 320);
        drawRest(ctx, W, H, o);
        resolve(canvas.toDataURL("image/png"));
      };
      img.onerror = paint;
      img.src = o.imagemUrl;
    } else paint();
  });
}

// ---------- Persistence (Firestore) ----------
function whenFirebaseReady(cb) {
  if (window.firebaseHistory) return cb();
  window.addEventListener("firebase-ready", cb, { once: true });
}
async function loadHistory() {
  if (!window.firebaseHistory) return;
  const docs = await window.firebaseHistory.loadAll();
  if (docs.length) state.history = docs;
}
function saveOfferToHistory(offer) {
  if (!window.firebaseHistory) return;
  window.firebaseHistory.save(offer).catch(() => {});
}
async function loadOfertasBot() {
  if (!window.firebaseOfertas) return;
  state.ofertasBot = await window.firebaseOfertas.carregarAtivas();
}
async function loadAfiliado(uid) {
  if (!window.firebaseAfiliado) return;
  const dados = await window.firebaseAfiliado.carregar(uid);

function setTab(t) { state.tab = t; render(); }
function setFiltroLoja(v) { state.filtroLoja = v; renderMain(); }
function setFiltroCategoria(v) { state.filtroCategoria = v; renderMain(); }
function setField(k, v) { state.form[k] = v; }

function flashCopied(key) {
  state.copiedKey = key;
  renderMain();
  setTimeout(() => { state.copiedKey = null; renderMain(); }, 1400);
}
function copyOfferText(offer) {
  const text = offer.copy && offer.copy.texto ? offer.copy.texto : fallbackCopy(offer.produto, offer.precoAtual, offer.precoAntigo, offer.cupom).texto;
  navigator.clipboard?.writeText(text);
  flashCopied(offer.id + "-text");
}
function copyOfferLink(offer) {
  navigator.clipboard?.writeText(offer.linkAfiliado || offer.link || "https://shope.ee/exemplo");
  flashCopied(offer.id + "-link");
}
async function downloadOfferArt(offer) {
  const canvas = document.getElementById("bannerCanvas");
  const url = await drawBanner(canvas, offer);
  const a = document.createElement("a");
  a.href = url;
  a.download = `oferta-${(offer.produto || "produto").toLowerCase().replace(/\s+/g, "-").slice(0, 30)}.png`;
  a.click();
}
function resetForm() {
  state.form = { link: "", produto: "", loja: "Shopee", precoAntigo: "", precoAtual: "", comissaoPct: "", cupom: "", imagemUrl: "" };
  state.pipeline = null; state.generated = null; state.error = null;
  renderMain();
}
async function runPipeline() {
  const f = state.form;
  state.error = null;
  if (!f.produto || !f.precoAntigo || !f.precoAtual || !f.comissaoPct) {
    state.error = "Preencha produto, preço antigo, preço atual e % de comissão.";
    renderMain(); return;
  }
  const antigo = parseFloat(String(f.precoAntigo).replace(",", "."));
  const atual = parseFloat(String(f.precoAtual).replace(",", "."));
  const comissao = parseFloat(String(f.comissaoPct).replace(",", "."));
  if (isNaN(antigo) || isNaN(atual) || isNaN(comissao)) {
    state.error = "Preços e comissão precisam ser números.";
    renderMain(); return;
  }
  state.generated = null;
  state.busy = true;
  state.pipeline = PIPELINE_STEPS.map(s => ({ ...s, status: "pending" }));
  renderMain();

  // dispara a chamada ao backend (calcula desconto/comissão + gera o texto com IA)
  // e a animação dos bots roda em paralelo, sem travar a interface.
  const backendPromise = chamarBackendGerarOferta({
    produto: f.produto, loja: f.loja, precoAntigo: antigo, precoAtual: atual,
    comissaoPct: comissao, cupom: f.cupom || null, link: f.link || null, imagemUrl: f.imagemUrl || null,
    afiliado: state.afiliado,
  }).catch(e => ({ __erro: e.message }));

  let backendData = null;
  for (let i = 0; i < PIPELINE_STEPS.length; i++) {
    state.pipeline[i].status = "active";
    renderMain();
    if (i === 3) {
      // espera o backend responder aqui (bot Copywriter IA)
      backendData = await backendPromise;
    } else {
      await new Promise(r => setTimeout(r, 450));
    }
    state.pipeline[i].status = "done";
    renderMain();
  }

  let offer;
  if (backendData && !backendData.__erro) {
    offer = { ...backendData, ts: Date.now(), cor: "#1e3a8a" };
  } else {
    // backend fora do ar (ex: Railway dormindo ou sem deploy) — usa fallback local
    state.error = backendData && backendData.__erro
      ? `Backend indisponível (${backendData.__erro}). Usando texto padrão.`
      : null;
    offer = {
      id: "gen-" + Date.now(),
      produto: f.produto, loja: f.loja, precoAntigo: antigo, precoAtual: atual, comissaoPct: comissao,
      cupom: f.cupom || null, link: f.link, imagemUrl: f.imagemUrl || null,
      linkAfiliado: gerarLinkAfiliadoLocal(f.loja, f.link, state.afiliado),
      copy: fallbackCopy(f.produto, atual, antigo, f.cupom), ts: Date.now(), cor: "#1e3a8a",
    };
  }
  state.generated = offer;
  state.history = [offer, ...state.history].slice(0, 30);
  saveOfferToHistory(offer);
  state.busy = false;
  renderMain();
}

  return `

        <span class="pill" style="${tierStyle(c.cls)}">${c.dot} comissão ${c.label}</span>
        ${o.cupom ? `<span class="pill" style="color:#c4b5fd;background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);">🎟 ${o.cupom}</span>` : ""}
      </div>

        <button onclick='handleDownload("${oJson}")'>⬇ Arte</button>
      </div>
    </div>
  </div>`;
}
function handleCopyText(encoded) { copyOfferText(JSON.parse(decodeURIComponent(encoded))); }
function handleCopyLink(encoded) { copyOfferLink(JSON.parse(decodeURIComponent(encoded))); }
function handleDownload(encoded) { downloadOfferArt(JSON.parse(decodeURIComponent(encoded))); }

      <div class="disclaimer">* Isso é só uma preferência salva no seu perfil. Para mudar de verdade quanto em quanto tempo o bot roda, edite a linha "cron" em .github/workflows/cacador.yml no repositório do backend.</div>
      <div>
        <button class="btn-primary" style="max-width:200px;" onclick="salvarPerfil()" ${state.perfilSalvando ? "disabled" : ""}>${state.perfilSalvando ? "Salvando..." : "💾 Salvar"}</button>
        ${state.perfilSalvo ? `<span class="save-ok">✓ Salvo</span>` : ""}
      </div>
    </div>
  </div>`;
}

// ---------- Render: history tab ----------
function renderHistoryTab() {
  return `
  <div class="card hist-section">
    <div class="panel-title" style="padding:0 0 14px;">📜 Histórico de ofertas geradas</div>
    ${state.history.length === 0 ? `<div class="placeholder-text">Nenhuma oferta gerada ainda.</div>` :
      `<div class="offers-grid">${state.history.map(offerCardHTML).join("")}</div>`}
  </div>`;
}

// ---------- Render: main ----------
function renderMain() {
  // preserve focus/cursor on inputs across re-render of the link tab
  const active = document.activeElement;
  const activeId = active && active.id;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;

  const html =
    state.tab === "dashboard" ? renderDashboard() :
    state.tab === "link" ? renderLinkTab() :
    state.tab === "historico" ? renderHistoryTab() :
    state.tab === "perfil" ? renderPerfilTab() :
    state.tab === "config" ? renderConfigTab() :
    renderDashboard();
  document.getElementById("main").innerHTML = html;

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart !== null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selStart); } catch (e) {}
      }
    }
  }
}

// ---------- Render: sidebar ----------
function renderBotRoster() {
  document.getElementById("botRoster").innerHTML = BOTS.map(b => `
    <div class="bot-row">
      <div class="bot-icon" style="background:${b.color}1A;color:${b.color};">
        ${b.icon}<span class="bot-dot"></span>
      </div>
      <div>
        <div class="bot-name">${b.name}</div>
        <div class="bot-role">${b.role}</div>
      </div>
    </div>
  `).join("");
}
function renderActivity() {
  document.getElementById("activityFeed").innerHTML = state.activity.map(a => {
    const secs = Math.max(0, Math.floor((Date.now() - a.ts) / 1000));
    return `<div class="activity-item">
      <span style="color:${a.color};">›</span>
      <div><div class="activity-text">${a.text}</div><div class="activity-time">${secs <= 1 ? "agora mesmo" : `há ${secs}s`}</div></div>
    </div>`;
  }).join("");
}

function render() {
  renderNav();
  renderMain();
  renderBotRoster();
  renderActivity();
  renderAuthBox();
}

// ---------- Background loops ----------
function addActivity() {
  const bot = BOTS[Math.floor(Math.random() * BOTS.length)];
  const tpl = ACTIVITY_TEMPLATES[Math.floor(Math.random() * ACTIVITY_TEMPLATES.length)];
  state.activity = [{ id: Date.now() + Math.random(), text: tpl(bot.name), color: bot.color, ts: Date.now() }, ...state.activity].slice(0, 6);
  renderActivity();
}
setInterval(() => { renderActivity(); }, 1000); // refresh "Xs atrás" labels
setInterval(addActivity, 4500);

// ---------- Boot ----------
function init() {
  addActivity();
  render(); // já mostra a tela mesmo antes do Firebase responder
  whenFirebaseReady(async () => {
    await loadHistory();
    await loadOfertasBot();
    renderMain();
    window.firebaseAuth.onChange(async (user) => {
      state.user = user;
      if (user) await loadAfiliado(user.uid);
      render();
    });
  });
  setInterval(async () => {
    if (window.firebaseOfertas) {
      await loadOfertasBot();
      if (state.tab === "dashboard") renderMain();
    }
  }, 5 * 60 * 1000); // atualiza a lista de ofertas a cada 5 min
}
init();
</script>
</body>
</html>
