name: Bot Caçador de Ofertas

on:
schedule:
# Roda a cada 30 minutos, mas em horários "quebrados" (ex: 02, 32) para evitar picos de detecção
- cron: "2,32 * * * *"
workflow_dispatch: {}

jobs:
buscar-ofertas:
runs-on: ubuntu-latest
timeout-minutes: 25 # Aumentado para garantir tempo de retry e proxies lentos

steps:
- name: Checkout do código
uses: actions/checkout@v4

- name: Configurar Node.js
uses: actions/setup-node@v4
with:
node-version: "20"

- name: Instalar dependências
run: npm install

- name: Instalar Chromium para o Puppeteer
run: npx puppeteer browsers install chrome

- name: Rodar Bot Caçador
run: npm run cacador
env:
FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
OWNER_UID: ${{ secrets.OWNER_UID }}
GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
MIN_COMISSAO_PCT: "5"
# ADICIONE ESTA LINHA:
PROXY_LIST: ${{ secrets.PROXY_LIST }}
